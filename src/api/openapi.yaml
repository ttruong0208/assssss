components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      description: Number of items per page
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number
    Sort:
      name: sort
      in: query
      schema:
        type: string
        default: createdAt
      description: Sort field
    Order:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
      description: Sort order

  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Operation success status
        data:
          description: Response data (varies by endpoint)
        error:
          type: string
          description: Error message (when success is false)
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Validation errors (when success is false)
        message:
          type: string
          description: Success message (when success is true)
      required:
        - success

    PaginatedResponse:
      type: object
      properties:
        docs:
          type: array
          description: Array of items
        totalDocs:
          type: integer
          description: Total number of documents
        totalPages:
          type: integer
          description: Total number of pages
        page:
          type: integer
          description: Current page
        limit:
          type: integer
          description: Items per page
        hasNextPage:
          type: boolean
          description: Whether there is a next page
        hasPrevPage:
          type: boolean
          description: Whether there is a previous page
        nextPage:
          type: integer
          nullable: true
          description: Next page number
        prevPage:
          type: integer
          nullable: true
          description: Previous page number
      required:
        - docs
        - totalDocs
        - totalPages
        - page
        - limit
        - hasNextPage
        - hasPrevPage

    User:
      type: object
      properties:
        id:
          type: string
          description: User ID
        email:
          type: string
          format: email
          description: User email
        name:
          type: string
          description: User name
        phone:
          type: string
          description: User phone
        avatar:
          type: string
          description: Avatar URL
        role:
          type: string
          enum: [user, admin, shop_owner]
          description: User role
        status:
          type: string
          enum: [active, inactive, suspended]
          description: User status
      required:
        - id
        - email
